<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: linear-gradient(160deg,#f1f8e9,#e8f5e9,#e0f7fa); min-height: 100vh; }
header { display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(255,255,255,.9); border-bottom:2px solid #c8e6c9; position:sticky; top:0; z-index:10; }
.logo-title { font-weight:900; font-size:17px; color:#1b5e20; }
.logo-sub { font-size:11px; color:#558b2f; }
main { flex:1; padding:16px; display:flex; flex-direction:column; gap:18px; max-width:680px; width:100%; margin:0 auto; }
.greeting { display:flex; gap:10px; align-items:flex-start; animation:fadeIn .4s ease; }
.avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#a5d6a7,#80cbc4); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.bubble { background:#fff; border:1.5px solid #c8e6c9; border-radius:4px 16px 16px 16px; padding:12px 16px; line-height:1.8; font-size:14px; color:#1a2e1a; }
.section { background:rgba(255,255,255,.85); border-radius:16px; padding:16px; border:1.5px solid #c8e6c9; margin-bottom:0; }
.section-label { font-size:13px; font-weight:700; color:#388e3c; margin-bottom:12px; }
.mood-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.mood-btn { background:#fff; border:1.5px solid #c8e6c9; border-radius:12px; padding:8px 4px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all .2s; }
.mood-btn:hover { background:#e8f5e9; transform:translateY(-2px); }
.mood-emoji { font-size:20px; }
.mood-text { font-size:10px; color:#2e7d32; font-weight:700; text-align:center; line-height:1.3; }
.area-grid { display:flex; flex-wrap:wrap; gap:6px; }
.area-btn { background:#fff; border:1.5px solid #a5d6a7; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:700; color:#1b5e20; cursor:pointer; transition:background .2s; }
.area-btn:hover { background:#e8f5e9; }
.search-row { display:flex; gap:8px; }
.search-input { flex:1; border:1.5px solid #c8e6c9; border-radius:10px; padding:10px 14px; font-size:14px; outline:none; font-family:inherit; }
.search-btn { background:linear-gradient(135deg,#2e7d32,#00695c); color:#fff; border:none; border-radius:10px; padding:10px 18px; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
.tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.tag { background:#e8f5e9; border:1px solid #a5d6a7; border-radius:20px; padding:4px 12px; font-size:12px; color:#2e7d32; cursor:pointer; font-weight:600; font-family:inherit; }
.result-header { display:flex; align-items:center; gap:12px; }
.back-btn { background:none; border:1.5px solid #c8e6c9; border-radius:10px; padding:6px 14px; font-size:13px; cursor:pointer; color:#2e7d32; font-weight:700; font-family:inherit; }
.result-title { font-size:15px; font-weight:700; color:#1b5e20; }
.result-count { font-size:13px; color:#558b2f; font-weight:600; }
.card-list { display:flex; flex-direction:column; gap:12px; }
.card { background:#fff; border:1.5px solid #c8e6c9; border-radius:16px; padding:16px; animation:fadeIn .3s ease; box-shadow:0 2px 10px rgba(0,0,0,.05); }
.card-top { display:flex; gap:12px; align-items:flex-start; margin-bottom:8px; }
.card-emoji { font-size:28px; line-height:1; }
.card-name { font-weight:800; font-size:15px; color:#1b5e20; }
.card-meta { font-size:12px; color:#666; margin-top:2px; }
.cat-badge { background:#e8f5e9; border-radius:10px; padding:1px 8px; color:#388e3c; font-weight:700; font-size:11px; }
.card-desc { font-size:13px; color:#333; line-height:1.7; margin-bottom:8px; }
.access-box { display:flex; align-items:flex-start; gap:6px; background:#f5f5f5; border-radius:8px; padding:7px 10px; margin-bottom:10px; font-size:12px; color:#555; line-height:1.6; }
.info-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.info-badge { background:#f5f5f5; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; color:#555; }
.badge-smoke { background:#fff3e0; color:#e65100; }
.badge-bunnen { background:#e8f5e9; color:#2e7d32; }
.card-bottom { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:8px; }
.card-tags { display:flex; flex-wrap:wrap; gap:5px; }
.card-tag { background:#e8f5e9; border-radius:20px; padding:2px 10px; font-size:11px; color:#388e3c; font-weight:600; }
.btn-row { display:flex; gap:6px; flex-shrink:0; }
.map-btn { background:#1565c0; color:#fff; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; text-decoration:none; display:inline-block; }
.site-btn { background:linear-gradient(135deg,#2e7d32,#00695c); color:#fff; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; text-decoration:none; display:inline-block; }
.smoking-row { display:flex; gap:6px; flex-wrap:wrap; }
.smoking-btn { background:#fff; border:1.5px solid #c8e6c9; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:700; color:#555; cursor:pointer; font-family:inherit; }
.smoking-btn.active { background:linear-gradient(135deg,#2e7d32,#00695c); color:#fff; border-color:#2e7d32; }
.no-result { display:flex; flex-direction:column; align-items:center; gap:16px; padding:40px; text-align:center; font-size:14px; line-height:1.8; color:#555; }
/* チェーン店 */
.chain-total { font-size:11px; color:#888; margin-bottom:12px; }
.chain-label { font-size:11px; font-weight:700; color:#388e3c; margin-bottom:6px; }
.chain-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.chain-btn { background:#fff; border:1.5px solid #c8e6c9; border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; color:#555; cursor:pointer; font-family:inherit; }
.chain-btn.active { background:linear-gradient(135deg,#2e7d32,#00695c); color:#fff; border-color:#2e7d32; }
.chain-count { font-size:12px; color:#558b2f; font-weight:700; margin-bottom:8px; }
.chain-grid { display:flex; flex-direction:column; gap:6px; }
.chain-card { display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid #e0e0e0; border-radius:10px; padding:8px 12px; text-decoration:none; color:#1a2e1a; }
.chain-name { font-size:12px; font-weight:700; color:#1b5e20; }
.chain-addr { font-size:11px; color:#888; margin-top:1px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.chain-note { font-size:11px; color:#aaa; margin-top:10px; text-align:center; }
/* マスコット */
.mascot-wrap { position:fixed; bottom:20px; right:16px; z-index:1000; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.mascot-btn { background:none; border:none; cursor:pointer; padding:0; filter:drop-shadow(0 3px 8px rgba(0,0,0,.2)); }
.mascot-balloon { background:#fff; border:2px solid #6dd36d; border-radius:14px 14px 4px 14px; padding:8px 12px; font-size:12px; font-weight:700; color:#1b5e20; line-height:1.6; box-shadow:0 3px 12px rgba(0,0,0,.12); max-width:160px; text-align:center; }
.hidden { display:none; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.mascot-btn { animation:float 3s ease-in-out infinite; }
#page-top { display:flex; flex-direction:column; gap:18px; }
#page-results { display:none; flex-direction:column; gap:18px; }
</style>

  { emoji: "😴", label: "ゆったりしたい", keys: ["のんびり","癒し","静か","温泉","ゆったり"] },
  { emoji: "🔥", label: "アクティブに動きたい", keys: ["アクティブ","登山","スキー","体験","スノボ"] },
  { emoji: "🍣", label: "美味しいもの食べたい", keys: ["グルメ","カニ","そば","海鮮","ランチ"] },
  { emoji: "☕", label: "カフェでまったり", keys: ["カフェ","コーヒー","スイーツ","のんびり"] },
  { emoji: "🦕", label: "非日常を味わいたい", keys: ["恐竜","体験","ユニーク","非日常","VR"] },
  { emoji: "👨‍👩‍👧", label: "子どもと一緒", keys: ["家族","子ども","体験","水族館","科学館"] },
  { emoji: "💑", label: "デートしたい", keys: ["カップル","絶景","インスタ","おしゃれ","足湯"] },

  { emoji: "🛍️", label: "買い物・体験したい", keys: ["ショッピング","体験","買い物","お土産","工芸"] },
];

const AREAS = ["坂井市","あわら市","福井市","永平寺町","越前市","鯖江市","南越前町","池田町","勝山市","大野市","敦賀市","美浜町","若狭町","小浜市"];
const TAGS = ["カフェ","温泉旅館","恐竜","東尋坊","永平寺","桜","足湯","無料","雨の日","インスタ"];

const CHAIN_AREAS = ["すべて","福井市","坂井市","あわら市","越前市","鯖江市","勝山市","大野市","敦賀市","小浜市","若狭町","南越前町"];
const CHAIN_CATS = ["すべて","ファストフード","回転寿司","牛丼・丼","カフェチェーン","ファミレス","ラーメンチェーン","焼肉","スイーツ"];

let currentSmokingFilter = "すべて";
let currentResults = [];
let chainArea = "すべて";
let chainCat = "すべて";

function scoreSpotFn(spot, keys) {
  let s = 0;
  keys.forEach(k => {
    const kl = k.toLowerCase();
    if (spot.name.toLowerCase().includes(kl)) s += 10;
    if (spot.area.toLowerCase().includes(kl)) s += 8;
    if (spot.cat.toLowerCase().includes(kl)) s += 6;
    spot.tags.forEach(t => { if (t.includes(kl) || kl.includes(t)) s += 3; });
    if (spot.desc.includes(k)) s += 2;
  });
  return s;
}

function searchSpots(query) {
  const keys = query.trim().split(/[\s\u3000]+/);
  return SPOTS.map(s => ({ ...s, _score: scoreSpotFn(s, keys) }))
    .filter(s => s._score > 0).sort((a, b) => b._score - a._score).slice(0, 6);
}

function searchByKeysFn(keys) {
  return SPOTS.map(s => ({ ...s, _score: scoreSpotFn(s, keys) }))
    .filter(s => s._score > 0).sort((a, b) => b._score - a._score).slice(0, 6);
}

function showMood(i) {
  const m = MOODS[i];
  showResults(m.label, searchByKeysFn(m.keys));
}

function showResults(label, found) {
  currentResults = found;
  currentSmokingFilter = "すべて";
  document.getElementById("result-title").textContent = label;
  document.getElementById("page-top").style.display = "none";
  document.getElementById("page-results").style.display = "flex";
  renderSmokingRow();
  renderCards();
}

function goBack() {
  document.getElementById("page-top").style.display = "flex";
  document.getElementById("page-results").style.display = "none";
}

function renderSmokingRow() {
  const row = document.getElementById("smoking-row");
  row.innerHTML = ["すべて","可","分煙","禁煙"].map(v => {
    const label = v === "すべて" ? "🍽️ すべて" : v === "可" ? "🚬 喫煙可" : v === "分煙" ? "🚬 分煙" : "🚭 禁煙";
    return `<button class="smoking-btn${currentSmokingFilter===v?' active':''}" onclick="setSmokingFilter('${v}')">${label}</button>`;
  }).join("");
}

function setSmokingFilter(v) {
  currentSmokingFilter = v;
  renderSmokingRow();
  renderCards();
}

function renderCards() {
  const filtered = currentResults.filter(r => currentSmokingFilter === "すべて" || r.smoking === currentSmokingFilter);
  document.getElementById("result-count").textContent = filtered.length + "件見つかったよ！";

  if (filtered.length === 0) {
    document.getElementById("card-list").innerHTML = `<div class="no-result"><div style="font-size:40px">🦕</div><div>ごめん、ぴったりのスポットが見つからんかった！<br>別のキーワードで試してみてね。</div></div>`;
    return;
  }

  document.getElementById("card-list").innerHTML = filtered.map(spot => {
    const smokingBadge = spot.smoking ? `<span class="info-badge ${spot.smoking==='可'?'badge-smoke':spot.smoking==='分煙'?'badge-bunnen':''}">${spot.smoking==='可'?'🚬 喫煙可':spot.smoking==='分煙'?'🚬 分煙':'🚭 禁煙'}</span>` : '';
    const parkingBadge = spot.parking !== undefined ? `<span class="info-badge">${spot.parking?'🅿️ 駐車場あり':'🅿️ 駐車場なし'}</span>` : '';
    const cardBadge = spot.card !== undefined ? `<span class="info-badge">${spot.card?'💳 カード可':'💳 現金のみ'}</span>` : '';
    const infoBadges = (smokingBadge || parkingBadge || cardBadge) ? `<div class="info-row">${smokingBadge}${parkingBadge}${cardBadge}</div>` : '';
    const accessHtml = spot.access ? `<div class="access-box">🚃 ${spot.access}</div>` : '';
    const urlBtn = spot.url ? `<a href="${spot.url}" target="_blank" class="site-btn">🔗 公式</a>` : '';
    return `<div class="card">
      <div class="card-top">
        <span class="card-emoji">${spot.emoji}</span>
        <div>
          <div class="card-name">${spot.name}</div>
          <div class="card-meta">📍${spot.area}　<span class="cat-badge">${spot.cat}</span></div>
        </div>
      </div>
      <div class="card-desc">${spot.desc}</div>
      ${accessHtml}
      ${infoBadges}
      <div class="card-bottom">
        <div class="card-tags">${spot.tags.slice(0,4).map(t=>`<span class="card-tag">#${t}</span>`).join('')}</div>
        <div class="btn-row">
          <a href="https://www.google.com/maps/search/${encodeURIComponent(spot.name+' '+spot.area)}" target="_blank" class="map-btn">🗺️ マップ</a>
          ${urlBtn}
        </div>
      </div>
    </div>`;
  }).join("");
}

function doSearch() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return;
  showResults(`「${q}」の検索結果`, searchSpots(q));
}

function renderChains() {
  document.getElementById("chain-total").textContent = `福井県内 ${CHAINS.length}店舗収録`;

  document.getElementById("chain-area-row").innerHTML = CHAIN_AREAS.map(a =>
    `<button class="chain-btn${chainArea===a?' active':''}" onclick="setChainArea('${a}')">${a}</button>`
  ).join("");

  document.getElementById("chain-cat-row").innerHTML = CHAIN_CATS.map(c =>
    `<button class="chain-btn${chainCat===c?' active':''}" onclick="setChainCat('${c}')">${c}</button>`
  ).join("");

  const filtered = CHAINS.filter(c =>
    (chainArea === "すべて" || c.area === chainArea) &&
    (chainCat === "すべて" || c.cat === chainCat)
  );
  document.getElementById("chain-count").textContent = filtered.length + "件";
  document.getElementById("chain-grid").innerHTML = filtered.map(c =>
    `<a href="https://www.google.com/maps/search/${encodeURIComponent(c.name+' '+c.addr)}" target="_blank" class="chain-card">
      <span style="font-size:18px">${c.emoji}</span>
      <div style="flex:1;min-width:0">
        <div class="chain-name">${c.name}</div>
        <div class="chain-addr">📍${c.addr}</div>
      </div>
      <span>🗺️</span>
    </a>`
  ).join("");
}

function setChainArea(a) { chainArea = a; renderChains(); }
function setChainCat(c) { chainCat = c; renderChains(); }

function toggleMascot() {
  const b = document.getElementById("mascot-balloon");
  const lines = ["福井においでよ！最高やよ〜！","越前ガニ、食べたことある？","恐竜博物館、ぜったい行ってや！","東尋坊の夕日、最高やよ！","あわら温泉、ゆっくりしてきてね♪","永平寺で心を整えよう！"];
  if (b.classList.contains("hidden")) {
    b.innerHTML = lines[Math.floor(Math.random()*lines.length)];
    b.classList.remove("hidden");
  } else {
    b.classList.add("hidden");
  }
}

// 初期描画
document.getElementById("mood-grid").innerHTML = MOODS.map((m, i) =>
  `<button class="mood-btn" onclick="showMood(${i})">
    <span class="mood-emoji">${m.emoji}</span>
    <span class="mood-text">${m.label}</span>
  </button>`
).join("");

document.getElementById("area-grid").innerHTML = AREAS.map(a =>
  `<button class="area-btn" onclick="showResults('${a}のスポット', searchSpots('${a}'))">${a}</button>`
).join("");

document.getElementById("tag-row").innerHTML = TAGS.map(t =>
  `<button class="tag" onclick="document.getElementById('search-input').value='${t}';showResults('「${t}」の検索結果', searchSpots('${t}'))">${t}</button>`
).join("");

renderChains();
</script>
